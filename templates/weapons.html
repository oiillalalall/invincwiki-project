{% extends 'base.html' %}

{% block title %} Weapons  {% endblock %}

{% block content %}

<h1 class="text-center" style="color:#3191CD">🔧 Weapons & Technology <a href="/add_weapon" class="btn btn-dark" style="color: #3191CD;">Add Weapons & Technology</a></h1>
<hr class="border border-1 opacity-100">

<div class="row">
    {% for weapon in weapons %}
    <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-center">
        <div class="card border-dark mb-3" style="width: 18rem; background-color: #FFE556;">
            <img src="{{ url_for('static', filename='images/' ~ (weapon.image or 'add_image.png')) }}" alt="{{ weapon.name }}" height="500">
            <div class="card-body">
                <h5 class="card-title">{{ weapon.name }}</h5>
                <hr>
                <h5 class="card-text">{{ weapon.description | truncate(120) }}</h5>
                <div class="btn-group">
                    <a href="/weapons/{{ weapon.id }}" class="btn btn-dark" style="color: #3191CD;">Go Invincible</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
