<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{%block title%} {%endblock%} </title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>


<nav class="navbar navbar-expand-lg sticky-top ">
    <div class="container">
        <a class="navbar-brand" href="#">
            <img src="/static/images/invincwiki.png" alt="Bootstrap" width="100" height="24">
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
                aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                {% if  current_user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link active" style="font-size: 24px;" aria-current="page" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" style="font-size: 24px;" aria-current="page" href="/logout">Logout</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" style="font-size: 24px;" aria-current="page" href="/profile">Profile</a>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link active" style="font-size: 24px;" aria-current="page" href="/register">Register</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" style="font-size: 24px;" aria-current="page" href="/login">Login</a>
                </li>
                {% endif %}
            </ul>
            <form action="/search" method="get" class="d-flex" >
                <input class="form-control me-2" id="search" type="search" placeholder="Search" name="text"/>
                <button class="btn btn-dark" id="text" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>


<div class="container shadow-lg p-3 mb-5 rounded main-content" id="main-content">
    {%block content%}
    {%endblock%}
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
