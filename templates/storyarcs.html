{% extends 'base.html' %}

{% block title %} Story Arcs  {% endblock %}

{% block content %}

<h1 class="text-center" style="color:#3191CD">📰 Story Arcs <a href="/add_storyarc" class="btn btn-dark" style="color: #3191CD;">Add Story Arc</a></h1>
<hr class="border border-1 opacity-100">

<div class="row">
    {% for storyarc in storyarcs %}
    <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-center">
        <div class="card border-dark mb-3" style="width: 18rem; background-color: #FFE556;">
            <img src="{{ url_for('static', filename='images/' ~ (storyarc.image or 'add_image.png')) }}" alt="{{ storyarc.title }}" height="500">
            <div class="card-body">
                <h5 class="card-title">{{ storyarc.title }}</h5>
                <hr>
                <h5 class="card-text">{{ storyarc.description | truncate(120) }}</h5>
                <div class="btn-group">
                    <a href="/storyarcs/{{ storyarc.id }}" class="btn btn-dark" style="color: #3191CD;">Go Invincible</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
