{% extends 'base.html' %}

{% block title %} Episodes {% endblock %}

{% block content %}

<h1 class="text-center" style="color:#3191CD">📺 Episodes <a href="/add_episode" class="btn btn-dark" style="color: #3191CD;">Add Episode</a></h1>
<hr class="border border-1 opacity-100">

<div class="row">
    {% for episode in episodes %}
    <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-center" >
        <div class="card border-dark mb-3" style="width: 18rem; background-color: #FFE556; ">
            <img src="{{ url_for('static', filename='images/' ~ (episode.image or 'add_image.jpg')) }}" alt="{{ episode.name }}" height="500">
            <div class="card-body">
                <h5 class="card-title">{{ episode.title }}</h5>
                <hr>
                <h5 class="card-text">{{ episode.summary | truncate(120) }}</h5>
                <div class="btn-group">
                    <a href="/episodes/{{ episode.id }}" class="btn btn-dark" style="color: #3191CD;">Go Invincible</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
