{% extends 'base.html' %}

{% block title %} Organizations  {% endblock %}

{% block content %}

<h1 class="text-center" style="color:#3191CD">🏢 Organizations <a href="/add_organization" class="btn btn-dark" style="color: #3191CD;">Add Organization</a></h1>
<hr class="border border-1 opacity-100">

<div class="row">
    {% for organization in organizations %}
    <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-center" >
        <div class="card border-dark mb-3" style="width: 18rem; background-color: #FFE556; ">
            <img src="{{ url_for('static', filename='images/' ~ (organization.image or 'add_image.jpg')) }}" alt="{{ organization.name }}" height="500">
            <div class="card-body">
                <h5 class="card-title">{{ organization.name }}</h5>
                <hr>
                <h5 class="card-text">{{ organization.description | truncate(120) }}</h5>
                <div class="btn-group">
                    <a href="/organizations/{{ organization.id }}" class="btn btn-dark" style="color: #3191CD;">Go Invincible</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
